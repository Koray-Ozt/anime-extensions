name: Build K-Kitsu extensions

on:
  push:
    branches:
      - master
    paths:
      - "src/tr/animecix/**"
      - "src/tr/animpow/**"
      - "src/tr/hentaizm/**"
      - "src/tr/tranimeizle/**"
      - "src/tr/turkanime/**"
      - ".github/workflows/build_push.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: k-kitsu-extensions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build signed extension repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare signing key
        shell: bash
        run: |
          printf '%s' "${{ secrets.SIGNING_KEY }}" | base64 --decode > signingkey.jks
          chmod 600 signingkey.jks

      - name: Build extensions
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :src:tr:animecix:assembleRelease :src:tr:animpow:assembleRelease :src:tr:hentaizm:assembleRelease :src:tr:tranimeizle:assembleRelease :src:tr:turkanime:assembleRelease

      - name: Prepare repository files
        shell: bash
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        run: |
          mkdir -p repo/apk
          find src/tr/animecix/build/outputs/apk/release src/tr/animpow/build/outputs/apk/release src/tr/hentaizm/build/outputs/apk/release src/tr/tranimeizle/build/outputs/apk/release src/tr/turkanime/build/outputs/apk/release -name '*.apk' -exec cp {} repo/apk/ \;
          for apk in repo/apk/*-release.apk; do
            mv "$apk" "${apk%-release.apk}.apk"
          done
          inspector_url="$(curl -fsSL https://api.github.com/repos/komikku-app/aniyomi-extensions-inspector/releases/latest | jq -r '.assets[0].browser_download_url')"
          curl -fsSL "$inspector_url" -o Inspector.jar
          java -jar Inspector.jar repo/apk output.json tmp
          python .github/scripts/create-repo.py
          fingerprint="$(keytool -list -v -keystore signingkey.jks -storepass "$KEY_STORE_PASSWORD" -alias "$ALIAS" | awk -F': ' '/SHA256:/ { gsub(":", "", $2); print tolower($2); exit }')"
          test -n "$fingerprint"
          jq -n \
            --arg name "K-Kitsu Extensions" \
            --arg shortName "K-Kitsu" \
            --arg website "https://github.com/Koray-Ozt/k-kitsu-extensions" \
            --arg fingerprint "$fingerprint" \
            '{meta: {name: $name, shortName: $shortName, website: $website, signingKeyFingerprint: $fingerprint}}' \
            > repo/repo.json

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anime-extensions-apk
          path: repo/apk/*.apk

      - name: Upload Anikku repository
        uses: actions/upload-artifact@v4
        with:
          name: anime-extensions-repo
          path: repo/
